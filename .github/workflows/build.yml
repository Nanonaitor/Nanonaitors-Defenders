name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Build
        run: ./gradlew build --no-daemon
